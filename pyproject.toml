[project]
name = "waterflow"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "torch==2.8.0",
  "torch-geometric",
  "torch-scatter",
  "torch-cluster",
  "pyg-lib",
  "biotite",
  "wandb",
  "e3nn",
  "esm>=3.2.3",
  "matplotlib",
  "pymol-open-source",
  "loguru",
  "numpy",
  "pandas",
  "pillow",
  "scikit-learn",
  "scipy",
  "tqdm",
]

[dependency-groups]
dev = [
    "black>=23.0.0",
    "flake8>=6.0.0",
    "hypothesis>=6.70.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "pandas-stubs>=2.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "pytest-timeout>=2.1.0",
    "pytest-xdist>=3.0.0",
    "types-tqdm>=4.0.0",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = [
    "scipy.*",
    "sklearn.*",
    "biotite.*",
    "e3nn.*",
    "torch_geometric.*",
    "torch_cluster.*",
    "torch_scatter.*",
    "pymol2.*",
    "esm.*",
]
ignore_missing_imports = true

# PyTorch CUDA 12.6 index
[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

# PyG “find-links” page as a flat index (equivalent to pip -f ...)
[[tool.uv.index]]
name = "pyg-cu126"
url = "https://data.pyg.org/whl/torch-2.8.0+cu126.html"
format = "flat"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu126" }

torch-scatter = { index = "pyg-cu126" }
torch-cluster = { index = "pyg-cu126" }
pyg-lib = { index = "pyg-cu126" }

