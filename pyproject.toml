[project]
name = "waterflow"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "torch==2.8.0",
  "torchvision",
  "torch-geometric",
  "torch-scatter",
  "torch-cluster",
  "pyg-lib",
  "biotite",
  "wandb",
  "networkx",
  "e3nn",
  "biopython",
  "matplotlib>=3.10.8",
  "pymol-open-source-whl>=3.1.0.4",
]

[dependency-groups]
dev = [
    "black>=23.0.0",
    "flake8>=6.0.0",
    "hypothesis>=6.70.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "pytest-timeout>=2.1.0",
    "pytest-xdist>=3.0.0",
]

# PyTorch CUDA 12.6 index (so `torch`/`torchvision` come from the right place)
[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

# PyG “find-links” page as a flat index (equivalent to pip -f ...)
[[tool.uv.index]]
name = "pyg-cu126"
url = "https://data.pyg.org/whl/torch-2.8.0+cu126.html"
format = "flat"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu126" }
torchvision = { index = "pytorch-cu126" }

torch-scatter = { index = "pyg-cu126" }
torch-cluster = { index = "pyg-cu126" }
pyg-lib = { index = "pyg-cu126" }

