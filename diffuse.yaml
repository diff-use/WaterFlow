  - slug: waterflow-inference
    name: WaterFlow Inference
    container:
      image: diffuseproject/waterflow
      tag: latest
      gpus:
        min: 1
    entrypoint: null
    input_schema:
      inputs:
        - key: run_dir
          type: text
          required: true
        - key: num_steps
          type: number
          default: "100"
        - key: pdb_list
          type: text
          default: /data/splits/valid_list_0.05.txt
        - key: method
          type: text
          default: rk4
        - key: use_sc
          type: boolean
          default: true
    run_config_defaults:
      shared_memory_size: "16Gi"
      runtime_class: nvidia
      image_pull_policy: IfNotPresent
      env:
        WANDB_MODE: disabled
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
      volumes:
        - name: waterflow-data
          hostPath: /data/waterflow
          mountPath: /data
        - name: pdb-data
          hostPath: /mnt/diffuse-public/pdb_redo_data
          mountPath: /data/pdb
          readOnly: true
      args_template:
        base_command: [inference]
        flag_args:
          run_dir: --run_dir
          pdb_list: --pdb_list
          method: --method
          num_steps: --num_steps
        boolean_args:
          use_sc: --use_sc
        static_args: [--output_dir, /data/outputs, --base_pdb_dir, /data/pdb]

  - slug: waterflow-generate-esm
    name: WaterFlow Generate ESM Embeddings
    container:
      image: diffuseproject/waterflow
      tag: latest
      gpus:
        min: 1
    entrypoint: null
    input_schema:
      inputs:
        - key: split_file
          type: text
          default: /data/splits/train_list_0.95.txt
    run_config_defaults:
      shared_memory_size: "16Gi"
      runtime_class: nvidia
      image_pull_policy: IfNotPresent
      env:
        WANDB_MODE: disabled
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
      volumes:
        - name: waterflow-data
          hostPath: /data/waterflow
          mountPath: /data
        - name: pdb-data
          hostPath: /mnt/diffuse-public/pdb_redo_data
          mountPath: /data/pdb
          readOnly: true
      args_template:
        base_command: [generate-esm]
        flag_args:
          split_file: --split_file
        boolean_args: {}
        static_args: [--cache_dir, /data/cache, --base_pdb_dir, /data/pdb]

fields:
  - key: waterflow_encoder_type
    type: enum
    display_name: Encoder Type
    allowed_values: [gvp, esm, slae]
    required: true
  - key: waterflow_epochs
    type: number
    display_name: Epochs
    default: "200"
  - key: waterflow_batch_size
    type: number
    display_name: Batch Size
    default: "4"
  - key: waterflow_learning_rate
    type: number
    display_name: Learning Rate
    default: "1e-4"
