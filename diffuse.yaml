# diffuse.yaml -- the contract between WaterFlow and Diffuse.
#
# Apply with: diffuse apply
# Run with:   diffuse run trigger --profile waterflow-train-gvp
#
# Idempotent -- safe to apply repeatedly.

version: 1

type: waterflow
name: WaterFlow
description: >
  Protein water structure prediction via flow matching.
  Predicts water molecule positions around proteins using
  continuous normalizing flows with GVP, ESM, or SLAE encoders.

profiles:
  - slug: waterflow-train-gvp
    name: WaterFlow Train (GVP)
    container:
      image: diffuseproject/waterflow
      tag: latest
      gpus:
        min: 1
    entrypoint: null
    input_schema:
      inputs:
        - key: encoder_type
          type: enum
          required: true
          allowed_values: [gvp]
          default: gvp
        - key: epochs
          type: number
          default: "200"
        - key: batch_size
          type: number
          default: "4"
        - key: lr
          type: number
          default: "1e-4"
        - key: scheduler
          type: text
          default: cosine
        - key: warmup_steps
          type: number
          default: "500"
        - key: save_dir
          type: text
          default: /data/checkpoints
        - key: num_workers
          type: number
          default: "4"
        - key: use_self_cond
          type: boolean
          default: true
        - key: run_name
          type: text
        - key: train_list
          type: text
          default: /data/splits/train_list_0.95.txt
        - key: val_list
          type: text
          default: /data/splits/valid_list_0.05.txt
    run_config_defaults:
      shared_memory_size: "16Gi"
      runtime_class: nvidia
      image_pull_policy: IfNotPresent
      env:
        WANDB_MODE: disabled
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
      volumes:
        - name: waterflow-data
          hostPath: /data/waterflow
          mountPath: /data
        - name: pdb-data
          hostPath: /mnt/diffuse-public/pdb_redo_data
          mountPath: /data/pdb
          readOnly: true
      args_template:
        base_command: [train]
        flag_args:
          encoder_type: --encoder_type
          epochs: --epochs
          batch_size: --batch_size
          lr: --lr
          train_list: --train_list
          val_list: --val_list
          scheduler: --scheduler
          warmup_steps: --warmup_steps
          save_dir: --save_dir
          run_name: --run_name
          num_workers: --num_workers
        boolean_args:
          use_self_cond: --use_self_cond
        static_args: [--base_pdb_dir, /data/pdb]

